<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>放デイ シフト入力プロトタイプ</title>
<style>
  body {
    font-family: "Yu Gothic", "游ゴシック", "Meiryo", sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 24px;
    color: #333;
  }
  h1 {
    font-size: 18px;
    margin: 0 0 8px;
  }
  .week-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .week-nav button {
    padding: 6px 14px;
    border: 1px solid #bbb;
    background: #fff;
    border-radius: 4px;
    cursor: pointer;
  }
  .week-nav .label {
    font-weight: bold;
    font-size: 15px;
  }
  table {
    border-collapse: collapse;
    background: #fff;
    table-layout: fixed;
    width: 100%;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  th, td {
    border: 1px solid #999;
    padding: 4px 6px;
    vertical-align: top;
    font-size: 12px;
    height: 56px;
  }
  thead th {
    background: #e8ecf1;
    text-align: center;
    font-weight: bold;
    height: 36px;
  }
  thead th.sat { background: #e0ecf6; color: #1a5ea0; }
  thead th.sun { background: #f6e0e0; color: #a01a1a; }
  .row-label {
    background: #f0f0f0;
    width: 110px;
    text-align: center;
    font-weight: bold;
    white-space: pre-line;
    font-size: 12px;
  }
  .row-label.vertical {
    writing-mode: vertical-rl;
    text-orientation: upright;
    width: 32px;
    padding: 8px 2px;
    letter-spacing: 3px;
    background: #e5ecf0;
    font-size: 12px;
  }
  td.cell input,
  td.cell textarea {
    width: 100%;
    border: none;
    background: transparent;
    font-size: 12px;
    font-family: inherit;
    box-sizing: border-box;
    padding: 2px;
    resize: none;
  }
  td.cell input:focus,
  td.cell textarea:focus {
    outline: 1px solid #4a90e2;
    background: #fffde7;
  }
  td.cell { position: relative; }
  td.cell.sat { background: #f2f7fb; }
  td.cell.sun { background: #fbf2f2; }

  /* 行グルーピング */
  tr.group-header td {
    background: #d9e2ec;
    font-weight: bold;
    text-align: center;
    height: 22px;
    font-size: 11px;
    color: #444;
  }
  .two-line { display: flex; flex-direction: column; gap: 2px; }
  .small { font-size: 10px; color: #888; }
  .legend { margin-top: 12px; font-size: 11px; color: #666; }
  .actions { margin-top: 16px; }
  .actions button {
    padding: 8px 18px;
    border: none;
    background: #4a90e2;
    color: #fff;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
  }
  .actions button.secondary {
    background: #fff;
    color: #4a90e2;
    border: 1px solid #4a90e2;
    margin-left: 8px;
  }
</style>
</head>
<body>
